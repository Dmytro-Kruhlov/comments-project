extends:
  - "@commitlint/config-conventional"

rules:
  type-enum:
    - 2
    - always
    - [
        feat,
        fix,
        chore,
        docs,
        style,
        refactor,
        perf,
        test,
        ci
      ]
  scope-case:
    - 2
    - always
    - kebab-case
  subject-case:
    - 2
    - always
    - sentence-case
  subject-empty:
    - 2
    - never
  header-max-length:
    - 2
    - always
    - 100
